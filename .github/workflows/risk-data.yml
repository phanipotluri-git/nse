name: Update Risk Data

on:
  push:
    branches: [main]
    paths:
      - "scripts/fetch_risk_data.py"
  schedule:
    - cron: "0 1 * * 1-5"    # 6:30 AM IST  Mon-Fri
    - cron: "30 4 * * 1-5"   # 10:00 AM IST Mon-Fri
    - cron: "30 7 * * 1-5"   # 1:00 PM IST  Mon-Fri
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install yfinance pandas numpy
      - name: Run risk data script
        run: python scripts/fetch_risk_data.py
      - name: Commit updated risk_factors.json
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/risk_factors.json
          git diff --staged --quiet && echo "No changes - skipping commit" && exit 0
          git commit -m "chore: risk data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
